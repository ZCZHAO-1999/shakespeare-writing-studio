<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbf6"/>
      <stop offset=".58" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#fff1dd"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#d8e2dc" stroke-width="1" opacity=".68"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#29423d" flood-opacity=".14"/>
    </filter>
    <linearGradient id="compute" x1="0" x2="1">
      <stop offset="0" stop-color="#1b7f79"/>
      <stop offset="1" stop-color="#79c9bd"/>
    </linearGradient>
    <linearGradient id="power" x1="0" x2="1">
      <stop offset="0" stop-color="#d67a35"/>
      <stop offset="1" stop-color="#b9513f"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="900" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="900" rx="34" fill="url(#grid)"/>
  <text x="72" y="82" font-family="Avenir Next, sans-serif" font-size="14" font-weight="900" letter-spacing="6" fill="#1b7f79">AI POWER BOTTLENECK ATLAS</text>
  <text x="72" y="146" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#182622">Two roadmaps now decide the AI buildout</text>
  <text x="74" y="188" font-family="Avenir Next, sans-serif" font-size="19" fill="#60706b">Model releases move quickly. Power, equipment, permits, and local consent move on a different clock.</text>

  <g transform="translate(76 244)" font-family="Avenir Next, sans-serif">
    <rect x="0" y="0" width="1128" height="390" rx="28" fill="#fffefa" filter="url(#shadow)"/>
    <line x1="564" y1="56" x2="564" y2="330" stroke="#e3ded2"/>

    <text x="42" y="58" font-size="13" font-weight="900" letter-spacing="5" fill="#1b7f79">ROADMAP 01</text>
    <text x="42" y="96" font-size="31" font-weight="900" fill="#172523">Compute calendar</text>
    <text x="42" y="124" font-size="16" fill="#65736f">models, GPUs, utilization, clusters</text>

    <text x="622" y="58" font-size="13" font-weight="900" letter-spacing="5" fill="#d67a35">ROADMAP 02</text>
    <text x="622" y="96" font-size="31" font-weight="900" fill="#172523">Grid calendar</text>
    <text x="622" y="124" font-size="16" fill="#65736f">interconnection, transformers, permits, sites</text>

    <path d="M48 190H488" stroke="#d7eee8" stroke-width="16" stroke-linecap="round"/>
    <path d="M48 190H488" stroke="url(#compute)" stroke-width="5" stroke-linecap="round"/>
    <path d="M642 190H1082" stroke="#fae1c8" stroke-width="16" stroke-linecap="round"/>
    <path d="M642 190H1082" stroke="url(#power)" stroke-width="5" stroke-linecap="round"/>

    <g fill="#fffefa" stroke="#dce7e1" stroke-width="2">
      <circle cx="48" cy="190" r="16"/>
      <circle cx="268" cy="190" r="16"/>
      <circle cx="488" cy="190" r="16"/>
      <circle cx="642" cy="190" r="16"/>
      <circle cx="862" cy="190" r="16"/>
      <circle cx="1082" cy="190" r="16"/>
    </g>
    <g fill="#172523">
      <circle cx="48" cy="190" r="8"/>
      <circle cx="268" cy="190" r="8"/>
      <circle cx="488" cy="190" r="8"/>
      <circle cx="642" cy="190" r="8"/>
      <circle cx="862" cy="190" r="8"/>
      <circle cx="1082" cy="190" r="8"/>
    </g>

    <text x="42" y="246" font-size="15" font-weight="900" fill="#172523">Model demand</text>
    <text x="42" y="270" font-size="13" fill="#65736f">training + inference</text>
    <text x="226" y="246" font-size="15" font-weight="900" fill="#172523">Data centres</text>
    <text x="226" y="270" font-size="13" fill="#65736f">clusters land in places</text>
    <text x="430" y="246" font-size="15" font-weight="900" fill="#172523">Workloads</text>
    <text x="430" y="270" font-size="13" fill="#65736f">utilization becomes load</text>
    <text x="622" y="246" font-size="15" font-weight="900" fill="#172523">Interconnection</text>
    <text x="622" y="270" font-size="13" fill="#65736f">queues and substations</text>
    <text x="824" y="246" font-size="15" font-weight="900" fill="#172523">Equipment</text>
    <text x="824" y="270" font-size="13" fill="#65736f">transformers, cooling</text>
    <text x="1010" y="246" font-size="15" font-weight="900" fill="#172523">Permission</text>
    <text x="1010" y="270" font-size="13" fill="#65736f">rates, water, land</text>

    <rect x="42" y="316" width="1040" height="46" rx="14" fill="#eef7f0"/>
    <text x="64" y="345" font-size="17" font-weight="900" fill="#1b7f79">Thesis · AI infrastructure has two schedules: the model release calendar and the grid connection calendar.</text>
  </g>

  <g transform="translate(76 674)" font-family="Avenir Next, sans-serif">
    <rect x="0" y="0" width="350" height="112" rx="22" fill="#fffefa" filter="url(#shadow)"/>
    <text x="26" y="42" font-size="31" font-weight="900" fill="#172523">485 → 950 TWh</text>
    <text x="26" y="72" font-size="14" fill="#65736f">global data-centre electricity demand, 2025–2030</text>
    <text x="26" y="94" font-size="12" fill="#8a9692">Source: IEA</text>

    <rect x="389" y="0" width="350" height="112" rx="22" fill="#fffefa" filter="url(#shadow)"/>
    <text x="415" y="42" font-size="31" font-weight="900" fill="#172523">325–580 TWh</text>
    <text x="415" y="72" font-size="14" fill="#65736f">possible U.S. data-centre electricity use by 2028</text>
    <text x="415" y="94" font-size="12" fill="#8a9692">Source: LBNL / DOE</text>

    <rect x="778" y="0" width="350" height="112" rx="22" fill="#fffefa" filter="url(#shadow)"/>
    <text x="804" y="42" font-size="31" font-weight="900" fill="#172523">31 → 66 GW</text>
    <text x="804" y="72" font-size="14" fill="#65736f">U.S. data-centre power demand, 2025–2027</text>
    <text x="804" y="94" font-size="12" fill="#8a9692">Source: Goldman Sachs</text>
  </g>

  <text x="76" y="846" font-family="Avenir Next, sans-serif" font-size="13" fill="#7a8783">Sources: International Energy Agency; Lawrence Berkeley National Laboratory; U.S. Department of Energy; Goldman Sachs Research.</text>
</svg>
