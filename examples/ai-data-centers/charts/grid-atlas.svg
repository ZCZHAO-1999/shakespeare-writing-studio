<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <radialGradient id="a" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#193047" stop-opacity=".85"/>
      <stop offset=".62" stop-color="#0d1420" stop-opacity=".5"/>
      <stop offset="1" stop-color="#070b12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#8fc7e5"/>
      <stop offset=".5" stop-color="#79d0bf"/>
      <stop offset="1" stop-color="#d97a3e"/>
    </linearGradient>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e2b3a" stroke-width="1" opacity=".55"/>
    </pattern>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".38"/>
    </filter>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="900" rx="34" fill="#070b12"/>
  <rect width="1280" height="900" rx="34" fill="url(#g)"/>
  <rect width="1280" height="900" rx="34" fill="url(#a)"/>

  <text x="70" y="78" font-family="Avenir Next, sans-serif" font-size="14" font-weight="800" letter-spacing="6" fill="#8fc7e5">AI POWER BOTTLENECK ATLAS</text>
  <text x="70" y="142" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#f4efe7">The model race now runs through the grid</text>
  <text x="72" y="182" font-family="Avenir Next, sans-serif" font-size="19" fill="#8997a6">Compute demand is colliding with electricity, interconnection, equipment lead times, and local permission.</text>

  <g transform="translate(86 256)">
    <path d="M84 210H1000" stroke="#263748" stroke-width="18" stroke-linecap="round" opacity=".9"/>
    <path d="M84 210H1000" stroke="url(#flow)" stroke-width="4" stroke-linecap="round"/>
    <g font-family="Avenir Next, sans-serif">
      <g filter="url(#s)">
        <circle cx="84" cy="210" r="34" fill="#8fc7e5"/>
        <rect x="0" y="272" width="184" height="84" rx="16" fill="#0d131d" stroke="#263748"/>
        <text x="22" y="307" font-size="18" font-weight="800" fill="#f4efe7">Model demand</text>
        <text x="22" y="333" font-size="14" fill="#8796a6">training + inference</text>
      </g>
      <g filter="url(#s)">
        <circle cx="314" cy="210" r="38" fill="#79d0bf"/>
        <rect x="222" y="72" width="214" height="92" rx="16" fill="#0d131d" stroke="#263748"/>
        <text x="246" y="108" font-size="28" font-weight="900" fill="#f4efe7">485 → 950 TWh</text>
        <text x="246" y="136" font-size="14" fill="#8796a6">global data-centre electricity, 2025–2030</text>
      </g>
      <g filter="url(#s)">
        <circle cx="544" cy="210" r="42" fill="#f2c47a"/>
        <rect x="452" y="270" width="218" height="96" rx="16" fill="#0d131d" stroke="#263748"/>
        <text x="476" y="306" font-size="29" font-weight="900" fill="#f4efe7">325–580 TWh</text>
        <text x="476" y="334" font-size="14" fill="#8796a6">possible U.S. use by 2028</text>
      </g>
      <g filter="url(#s)">
        <circle cx="774" cy="210" r="38" fill="#d97a3e"/>
        <rect x="690" y="72" width="190" height="92" rx="16" fill="#0d131d" stroke="#263748"/>
        <text x="714" y="108" font-size="28" font-weight="900" fill="#f4efe7">31 → 66 GW</text>
        <text x="714" y="136" font-size="14" fill="#8796a6">U.S. power demand, 2025–2027</text>
      </g>
      <g filter="url(#s)">
        <circle cx="1000" cy="210" r="34" fill="#b85442"/>
        <rect x="910" y="270" width="212" height="96" rx="16" fill="#0d131d" stroke="#263748"/>
        <text x="934" y="306" font-size="22" font-weight="900" fill="#f4efe7">Local permission</text>
        <text x="934" y="334" font-size="14" fill="#8796a6">rates, water, land, transmission</text>
      </g>
    </g>

    <path d="M314 210C352 280 438 326 544 318" fill="none" stroke="#79d0bf" stroke-width="1.6" opacity=".58"/>
    <path d="M544 210C612 146 688 120 774 118" fill="none" stroke="#f2c47a" stroke-width="1.6" opacity=".58"/>
    <path d="M774 210C840 270 910 308 1000 318" fill="none" stroke="#d97a3e" stroke-width="1.6" opacity=".58"/>

    <g transform="translate(190 424)" font-family="Avenir Next, sans-serif">
      <rect x="0" y="0" width="760" height="92" rx="18" fill="#0d131d" stroke="#263748" filter="url(#s)"/>
      <text x="28" y="38" font-size="15" font-weight="800" letter-spacing="4" fill="#8fc7e5">THESIS</text>
      <text x="28" y="66" font-size="22" font-weight="700" fill="#f4efe7">AI infrastructure now has two roadmaps: one for chips, one for electricity.</text>
    </g>
  </g>

  <g transform="translate(86 764)" font-family="Avenir Next, sans-serif">
    <line x1="0" y1="0" x2="1094" y2="0" stroke="#263748"/>
    <text x="0" y="34" font-size="13" letter-spacing="4" fill="#657486">SOURCES</text>
    <text x="106" y="34" font-size="13" fill="#7f8c99">International Energy Agency · Lawrence Berkeley National Laboratory · U.S. Department of Energy · Goldman Sachs Research</text>
  </g>

  <text x="1100" y="74" font-family="Avenir Next, sans-serif" font-size="13" letter-spacing="4" fill="#657486">FIG · 01</text>
</svg>
