<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbf6"/>
      <stop offset=".55" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#fff2dc"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#1b7f79"/>
      <stop offset="1" stop-color="#d17a35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#29423d" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1120" height="720" rx="36" fill="url(#bg)"/>
  <text x="72" y="86" font-family="Avenir Next, Georgia, serif" font-size="28" font-weight="700" fill="#18302d">Global data-centre electricity demand</text>
  <text x="72" y="122" font-family="Avenir Next, sans-serif" font-size="17" fill="#60706b">IEA projection: demand roughly doubles from 2025 to 2030</text>
  <g stroke="#d7e0d9" stroke-width="1">
    <line x1="120" y1="570" x2="1000" y2="570"/>
    <line x1="120" y1="468" x2="1000" y2="468"/>
    <line x1="120" y1="366" x2="1000" y2="366"/>
    <line x1="120" y1="264" x2="1000" y2="264"/>
    <line x1="120" y1="162" x2="1000" y2="162"/>
  </g>
  <g font-family="Avenir Next, sans-serif" font-size="15" fill="#6a7773">
    <text x="66" y="575">0</text>
    <text x="52" y="473">250</text>
    <text x="52" y="371">500</text>
    <text x="52" y="269">750</text>
    <text x="42" y="167">1000</text>
    <text x="154" y="620">2025</text>
    <text x="928" y="620">2030</text>
    <text x="846" y="672">Source: International Energy Agency</text>
  </g>
  <path d="M180 372 C350 335, 540 280, 740 222 S900 184, 950 182" fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <path d="M180 372 C350 335, 540 280, 740 222 S900 184, 950 182 L950 570 L180 570 Z" fill="#1b7f79" opacity=".08"/>
  <g filter="url(#shadow)">
    <circle cx="180" cy="372" r="13" fill="#1b7f79"/>
    <rect x="122" y="284" width="164" height="70" rx="16" fill="#fffefa"/>
    <text x="144" y="316" font-family="Avenir Next, sans-serif" font-size="26" font-weight="700" fill="#18302d">485 TWh</text>
    <text x="144" y="340" font-family="Avenir Next, sans-serif" font-size="15" fill="#6a7773">2025</text>
  </g>
  <g filter="url(#shadow)">
    <circle cx="950" cy="182" r="13" fill="#d17a35"/>
    <rect x="804" y="88" width="174" height="72" rx="16" fill="#fffefa"/>
    <text x="826" y="121" font-family="Avenir Next, sans-serif" font-size="26" font-weight="700" fill="#18302d">950 TWh</text>
    <text x="826" y="145" font-family="Avenir Next, sans-serif" font-size="15" fill="#6a7773">2030</text>
  </g>
</svg>
