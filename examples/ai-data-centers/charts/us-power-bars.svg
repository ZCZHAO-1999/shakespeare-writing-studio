    <text x="522" y="348" font-size="34" font-weight="800" fill="#18302d">41</text>
    <text x="567" y="348" font-size="17" fill="#60706b">GW</text>
    <text x="522" y="620" font-size="18" fill="#60706b">2026</text>
    <text x="762" y="223" font-size="34" font-weight="800" fill="#18302d">66</text>
