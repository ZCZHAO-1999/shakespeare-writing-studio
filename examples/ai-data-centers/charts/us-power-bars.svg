    <line x1="130" y1="470" x2="1000" y2="470"/>
    <line x1="130" y1="370" x2="1000" y2="370"/>
    <line x1="130" y1="270" x2="1000" y2="270"/>
    <line x1="130" y1="170" x2="1000" y2="170"/>
  </g>
