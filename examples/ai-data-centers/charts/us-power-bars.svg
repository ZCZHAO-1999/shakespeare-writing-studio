<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6fafb"/>
      <stop offset=".55" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#fff0df"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d67a35"/>
      <stop offset="1" stop-color="#1b7f79"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#293f3c" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1120" height="720" rx="36" fill="url(#bg)"/>
  <text x="72" y="86" font-family="Avenir Next, Georgia, serif" font-size="28" font-weight="700" fill="#18302d">U.S. data-centre power demand</text>
  <text x="72" y="122" font-family="Avenir Next, sans-serif" font-size="17" fill="#60706b">Goldman Sachs Research / Marcus summary, expected capacity and utilization</text>
  <g stroke="#d7e0df" stroke-width="1">
